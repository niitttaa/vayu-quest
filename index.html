<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Vayu-Quest | Heat Sentinel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { background-color: #FFC0CB; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; transition: background-color 0.5s ease; }
        .extreme-bg { background-color: #ff4757 !important; }
        
        .neo-brutalism { 
            border: 4px solid black; 
            box-shadow: 8px 8px 0px 0px black; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes treeSway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(4deg); } }
        .shaking-tree { display: inline-block; animation: treeSway 3s ease-in-out infinite; transform-origin: bottom center; }
        
        #map { height: 300px; width: 100%; border: 4px solid black; }
        #live-clock { background: black; color: #A3E635; padding: 2px 8px; font-weight: 900; border: 2px solid black; }
        
        #share-drawer { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(100%); }
        #share-drawer.open { transform: translateY(0); }
    </style>
</head>
<body class="p-4">

    <div id="drawer-overlay" class="fixed inset-0 bg-black/40 z-[3000] hidden backdrop-blur-sm" onclick="toggleShare()"></div>
    <div id="share-drawer" class="fixed bottom-0 left-0 w-full bg-white border-t-8 border-black z-[3001] p-6 pb-10 rounded-t-3xl">
        <h3 class="text-2xl font-black uppercase mb-4 italic">Broadcast Heat Alert 🚨</h3>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="sendShare('wa')" class="neo-brutalism bg-[#25D366] p-3 font-black uppercase text-xs">WhatsApp</button>
            <button onclick="sendShare('tg')" class="neo-brutalism bg-[#0088cc] p-3 font-black uppercase text-white text-xs">Telegram</button>
            <button onclick="sendShare('tw')" class="neo-brutalism bg-black p-3 font-black uppercase text-white text-xs">X / Twitter</button>
            <button onclick="sendShare('fb')" class="neo-brutalism bg-[#1877F2] p-3 font-black uppercase text-white text-xs">Facebook</button>
            <button onclick="sendShare('ig')" class="neo-brutalism bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] p-3 font-black uppercase text-white text-xs">Instagram</button>
            <button onclick="sendShare('cp')" class="neo-brutalism bg-yellow-400 p-3 font-black uppercase text-xs">Copy Report</button>
        </div>
        <button onclick="toggleShare()" class="w-full mt-6 font-bold text-gray-400 uppercase text-[10px] tracking-widest">Dismiss Menu</button>
    </div>

    <div class="max-w-md mx-auto space-y-6 pb-32">
        <header class="neo-brutalism bg-[#A3E635] p-5 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">VAYU-QUEST</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="live-clock">00:00:00</span>
                    <p class="text-[10px] font-bold bg-black text-white px-2 uppercase">Live</p>
                </div>
            </div>
        </header>

        <div id="safety-card" class="neo-brutalism bg-white p-6 text-center">
            <p class="text-xs font-black uppercase text-gray-400 mb-1">Local Heat Status</p>
            <p id="safe-time" class="text-6xl font-black text-emerald-500">--</p>
            <p id="alert-text" class="text-[10px] font-black uppercase mt-2">Syncing Satellite Data...</p>
        </div>

        <div class="neo-brutalism bg-white p-4 h-48 relative">
            <canvas id="variationChart"></canvas>
        </div>

        <div class="neo-brutalism overflow-hidden relative">
            <div id="map"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="neo-brutalism bg-white p-4 text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase italic">Sentinel-3 Temp</p>
                <p id="curr-temp" class="text-3xl font-black text-red-500">--°C</p>
            </div>
            <div class="neo-brutalism bg-white p-4 text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase italic">UV Strength</p>
                <p id="curr-uv" class="text-3xl font-black text-orange-500">--</p>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-full p-4 bg-white/50 backdrop-blur-xl border-t-8 border-black z-[2500] flex gap-2">
            <button onclick="plantAtCurrent()" class="neo-brutalism flex-1 bg-black text-white p-4 text-lg font-black uppercase italic tracking-widest">
                Plant Shade 🌳
            </button>
            <button onclick="toggleShare()" class="neo-brutalism bg-yellow-400 p-4 aspect-square text-2xl">🚀</button>
        </div>
    </div>

    <script>
        let map, chart, lastPos, history = [], labels = [];
        let currentTemp = 0, currentUV = 0;

        function updateClock() {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB', { hour12: false });
        }
        setInterval(updateClock, 1000);

        function toggleShare() {
            document.getElementById('share-drawer').classList.toggle('open');
            document.getElementById('drawer-overlay').classList.toggle('hidden');
        }

        async function fetchHeatData(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,uv_index&timezone=auto`);
                const data = await res.json();
                currentTemp = data.current.temperature_2m;
                currentUV = data.current.uv_index;

                document.getElementById('curr-temp').innerText = currentTemp + "°C";
                document.getElementById('curr-uv').innerText = currentUV;

                if (currentTemp >= 34) {
                    document.body.classList.add('extreme-bg');
                    document.getElementById('alert-text').innerText = "🚨 CRITICAL HEAT DETECTED";
                } else {
                    document.body.classList.remove('extreme-bg');
                    document.getElementById('alert-text').innerText = "Safe Thermal Levels";
                }

                document.getElementById('safe-time').innerText = (currentUV > 6 ? 25 : 60) + "M";

                history.push(currentTemp);
                labels.push("");
                if(history.length > 10) { history.shift(); labels.shift(); }
                chart.update();

                L.circle([lat, lon], {radius: 12, color: currentTemp > 33 ? 'red' : 'green', fillOpacity: 0.6, stroke: false}).addTo(map);
            } catch (e) { console.log("Satellite Syncing..."); }
        }

        function sendShare(p) {
            const mapLink = lastPos ? `https://www.google.com/maps?q=${lastPos[0]},${lastPos[1]}` : "Location Hidden";
            const msg = `🌡️ VAYU-QUEST ALERT\nTemp: ${currentTemp}°C\nUV Index: ${currentUV}\nLocation: ${mapLink}\nHelp us map heat islands in Kerala! 🌳`;
            
            let url = "";
            switch(p) {
                case 'wa': url = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`; break;
                case 'tg': url = `https://t.me/share/url?url=${encodeURIComponent(msg)}`; break;
                case 'tw': url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(msg)}`; break;
                case 'fb': url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(mapLink)}&quote=${encodeURIComponent(msg)}`; break;
                case 'ig': alert("Copying report! You can now paste this into your Instagram Story or DM."); p = 'cp'; break;
            }

            if(p === 'cp') {
                navigator.clipboard.writeText(msg);
                alert("Thermal Report copied to clipboard!");
            } else if (url) {
                window.open(url, '_blank');
            }
        }

        function initApp(lat, lon) {
            map = L.map('map', {zoomControl: false, attributionControl: false}).setView([lat, lon], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            map.on('click', (e) => plantTree(e.latlng));

            const ctx = document.getElementById('variationChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: history,
                        borderColor: 'black',
                        borderWidth: 4,
                        backgroundColor: 'rgba(0,0,0,0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false }, x: { display: false } } }
            });
        }

        function plantTree(latlng) {
            const treeIcon = L.divIcon({
                html: `<div class="shaking-tree text-4xl">🌳</div>`,
                className: 'custom-div-icon',
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });
            L.marker(latlng, {icon: treeIcon}).addTo(map);
        }

        navigator.geolocation.watchPosition(pos => {
            const {latitude: lat, longitude: lon} = pos.coords;
            lastPos = [lat, lon];
            if(!map) initApp(lat, lon);
            map.panTo(lastPos);
            fetchHeatData(lat, lon);
        }, null, { enableHighAccuracy: true });

        function plantAtCurrent() { if(lastPos) plantTree({lat: lastPos[0], lng: lastPos[1]}); }
    </script>
</body>
</html>
